  <!-- Layer 2: Title -->
  <text x="450" y="22" text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="12" font-weight="bold" letter-spacing="4"
        fill="#00f5ff" filter="url(#fText)" opacity="0.92">
    ✦ A D I T Y A V E R S E   ·   S O L A R   S Y S T E M   ✦
  </text>

  <!-- Layer 3: Orbit ellipses (dashed guides) -->
  <ellipse cx="240" cy="190" rx="52"  ry="19" fill="none" stroke="#ff6b35" stroke-width="0.5" stroke-opacity="0.30" stroke-dasharray="3,5"/>
  <ellipse cx="240" cy="190" rx="88"  ry="31" fill="none" stroke="#54c5f8" stroke-width="0.5" stroke-opacity="0.28" stroke-dasharray="4,6"/>
  <ellipse cx="240" cy="190" rx="125" ry="44" fill="none" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.24" stroke-dasharray="5,7"/>
  <ellipse cx="240" cy="190" rx="168" ry="59" fill="none" stroke="#cccccc" stroke-width="0.5" stroke-opacity="0.18" stroke-dasharray="6,8"/>

  <!-- Layer 4: Sun -->
  <!-- Outer halo (pulsing) -->
  <circle class="sun-halo" cx="240" cy="190" r="62" fill="url(#sunHalo)"/>
  <!-- Core -->
  <circle class="sun-core" cx="240" cy="190" r="26" fill="url(#sunCore)" filter="url(#fGlow)"/>
  <!-- Hot spot -->
  <circle cx="232" cy="183" r="7" fill="#ffffd0" opacity="0.55"/>
  <!-- Labels -->
  <text x="240" y="234" text-anchor="middle" font-family="'Courier New',monospace" font-size="9"  fill="#ffcc00" filter="url(#fText)">☀ FULL STACK SUN</text>
  <text x="240" y="245" text-anchor="middle" font-family="'Courier New',monospace" font-size="7"  fill="#ff8800" opacity="0.8">ADITYA.DEV</text>

  <!-- Layer 5: Planets (animateMotion with rotate="none" keeps labels upright) -->

  <!-- ── Planet 1: ☄ Competitive Programming ── -->
  <g>
    <animateMotion dur="5s" begin="0s" repeatCount="indefinite" rotate="none">
      <mpath href="#p1"/>
    </animateMotion>
    <circle r="9" fill="url(#cpGrad)" filter="url(#fSoft)"/>
    <circle cx="-2.5" cy="-2.5" r="3" fill="#ffd090" opacity="0.5"/>
    <text y="21" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" font-weight="bold" fill="#ff9a3c">☄ CP</text>
  </g>

  <!-- ── Planet 2: 🌙 Flutter ── -->
  <g>
    <animateMotion dur="9s" begin="-3.5s" repeatCount="indefinite" rotate="none">
      <mpath href="#p2"/>
    </animateMotion>
    <circle r="11" fill="url(#flutterGrad)" filter="url(#fSoft)"/>
    <circle cx="-3" cy="-3" r="3.5" fill="#d0f8ff" opacity="0.5"/>
    <text y="25" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" font-weight="bold" fill="#54c5f8">🌙 FLUTTER</text>
  </g>

  <!-- ── Planet 3: 🪐 MERN ── -->
