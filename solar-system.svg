  <!-- Upper strip -->
  <circle class="star"  cx="14"  cy="18"  r="1.4"/>
  <circle class="star2" cx="68"  cy="10"  r="1.0"/>
  <circle class="star3" cx="132" cy="22"  r="1.8"/>
