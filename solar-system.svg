<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <defs>

    <!-- ═══ BACKGROUNDS ═══ -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000008"/>
      <stop offset="45%"  stop-color="#01001a"/>
      <stop offset="100%" stop-color="#080022"/>
    </linearGradient>

    <radialGradient id="nebula-bh" cx="84%" cy="50%" r="28%">
      <stop offset="0%"   stop-color="#5a0099" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#2a0055" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula-sun" cx="27%" cy="50%" r="22%">
      <stop offset="0%"   stop-color="#331100" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ═══ SUN ═══ -->
    <radialGradient id="sunCore" cx="38%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#ffffc8"/>
      <stop offset="25%"  stop-color="#ffdd00"/>
      <stop offset="65%"  stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>

    <radialGradient id="sunHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff8800" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#ff4400" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>

    <!-- ═══ PLANETS ═══ -->
    <radialGradient id="cpGrad" cx="33%" cy="33%" r="67%">
      <stop offset="0%"   stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>

    <radialGradient id="flutterGrad" cx="33%" cy="33%" r="67%">
      <stop offset="0%"   stop-color="#a0eeff"/>
      <stop offset="100%" stop-color="#005fa3"/>
    </radialGradient>

    <radialGradient id="mernGrad" cx="33%" cy="33%" r="67%">
      <stop offset="0%"   stop-color="#aaffcc"/>
      <stop offset="100%" stop-color="#006622"/>
    </radialGradient>

    <radialGradient id="nextGrad" cx="33%" cy="33%" r="67%">
      <stop offset="0%"   stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#303030"/>
    </radialGradient>

    <!-- ═══ BLACK HOLE ═══ -->
    <radialGradient id="bhCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="60%"  stop-color="#0a0022"/>
      <stop offset="100%" stop-color="#220044" stop-opacity="0.7"/>
    </radialGradient>

    <radialGradient id="bhGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8800ff" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#4400aa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ═══ FILTERS ═══ -->
    <filter id="fGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="fSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="fBH" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="fText" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ═══ ORBIT PATHS (for animateMotion) ═══ -->
    <!-- All orbits centered at sun (240, 190) -->
    <!-- Format: M cx+rx,cy  A rx,ry 0 1,0 cx-rx,cy  A rx,ry 0 1,0 cx+rx,cy -->
    <path id="p1" d="M 292,190 A 52,19 0 1,0 188,190 A 52,19 0 1,0 292,190"/>
    <path id="p2" d="M 328,190 A 88,31 0 1,0 152,190 A 88,31 0 1,0 328,190"/>
    <path id="p3" d="M 365,190 A 125,44 0 1,0 115,190 A 125,44 0 1,0 365,190"/>
    <path id="p4" d="M 408,190 A 168,59 0 1,0 72,190  A 168,59 0 1,0 408,190"/>

    <!-- ═══ ANIMATIONS ═══ -->
    <style>
      .star  { animation: tw 2s    ease-in-out infinite alternate; fill: #ffffff; }
      .star2 { animation: tw 3.4s  ease-in-out infinite alternate; fill: #cceeff; animation-delay: -1.2s; }
      .star3 { animation: tw 1.7s  ease-in-out infinite alternate; fill: #ffffff; animation-delay: -0.6s; }
      .star4 { animation: tw 4.1s  ease-in-out infinite alternate; fill: #ffeebb; animation-delay: -2.1s; }
      .star5 { animation: tw 2.8s  ease-in-out infinite alternate; fill: #ddeeff; animation-delay: -1.7s; }

      @keyframes tw { from { opacity: 0.05; } to { opacity: 0.90; } }

      @keyframes sunPulse {
        0%, 100% { opacity: 0.28; r: 62; }
        50%       { opacity: 0.52; r: 70; }
      }
      @keyframes sunCorePulse {
        0%, 100% { r: 26; }
        50%       { r: 29; }
      }

      .sun-halo { animation: sunPulse 2.8s ease-in-out infinite; }
      .sun-core { animation: sunCorePulse 2.8s ease-in-out infinite; transform-origin: 240px 190px; }

      @keyframes bhSpin1 { from { transform: rotate(0deg);    } to { transform: rotate(360deg);  } }
      @keyframes bhSpin2 { from { transform: rotate(0deg);    } to { transform: rotate(-360deg); } }
      @keyframes bhPulse { 0%,100% { opacity: 0.65; } 50% { opacity: 1; } }

      .bh-ring1 { transform-origin: 758px 190px; animation: bhSpin1 3.5s linear infinite; }
      .bh-ring2 { transform-origin: 758px 190px; animation: bhSpin2 5.5s linear infinite; }
      .bh-ring3 { transform-origin: 758px 190px; animation: bhSpin1 8s   linear infinite; }
      .bh-aura  { animation: bhPulse 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--              RENDER LAYERS             -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Layer 0: Background -->
  <rect width="900" height="380" fill="url(#bg)"/>
  <rect width="900" height="380" fill="url(#nebula-bh)"/>
  <rect width="900" height="380" fill="url(#nebula-sun)"/>

