    <circle cx="-3.5" cy="-3.5" r="4" fill="#ccffdd" opacity="0.4"/>
    <text y="29" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" font-weight="bold" fill="#00ff88">🪐 MERN</text>
